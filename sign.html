<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <img src="images/logo22.png" alt="Logo" class="logo" />
      </div>
      <h1>CUSTOMER REGISTRATION FORM</h1>

      <form>
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter username"
          required
        />

        <label for="nin">NIN Number</label>
        <input type="text" id="nin" placeholder="Enter NIN number" required />

        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="Enter email address"
          required
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter password"
          required
        />

        <label for="phone">Phone Number</label>
        <input
          type="tel"
          id="phone"
          placeholder="Enter phone number"
          required
        />

        <div class="sign">
          <label for="role">Log in As</label>
          <select id="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="admin">Admin</option>
            <option value="cashier">Cashier</option>
            <option value="manager">Manager</option>
            <option value="staff">Staff</option>
          </select>
        </div>

        <div class="remember">
          <div class="checkbox">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember me</label>
          </div>
        </div>

        <button type="submit">Log in</button>
        <a href="Sale.html" class="btn">Add Sale</a>
        <footer>&copy 2026 @Nyondo General Hardware Ltd All rights Copy right</footer>
      </form>
    </div>
  </body>
</html>
